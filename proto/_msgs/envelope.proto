syntax = "proto3";

package _msgs;

// Container for all messages sent over Ark network
message Envelope {

  enum SourceType {
    SOURCE_TYPE_UNSPECIFIED = 0;
    PUBLISH = 1;
    QUERY = 2;
    REPLY = 3;
  }

  message TraceMeta {
    string src_node_name = 1;
    SourceType src_type = 2;  
    uint64 sent_seq_index = 3;
    uint64 sent_ark_time_ns = 4;
    uint64 sent_wall_time_ns = 5;
    
  }

  string channel = 2;
  TraceMeta trace = 3;
  bytes payload = 4;

}